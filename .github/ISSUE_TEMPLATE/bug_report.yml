name: Bug report
description: Crash, wrong scan/generate, web UI, or build failure
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do **not** paste live `.env` secrets or real `SLIPNET_CONFIG` in public issues.

  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or commit / `dns-cli --version`
      placeholder: "v0.1.0 / main @ abc1234"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows 11
        - Windows 10
        - Linux
        - macOS
        - Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. .\dns-cli.cmd serve --bind 127.0.0.1:8787
        2. Click scan
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (redact secrets)
